name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (example: 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/GithubWatcher.Desktop/GithubWatcher.Desktop.csproj

      - name: Build
        run: dotnet build src/GithubWatcher.Desktop/GithubWatcher.Desktop.csproj --configuration Release --no-restore

      - name: Create and push tag
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Version is required."
          }

          $tag = "v$version"
          git fetch --tags

          if (git rev-parse $tag 2>$null) {
            throw "Tag '$tag' already exists."
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag $tag
          git push origin $tag

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $tag = "v$version"
          gh release create $tag --title "Release $tag" --generate-notes
