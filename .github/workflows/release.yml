name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (example: 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/GithubWatcher.Desktop/GithubWatcher.Desktop.csproj

      - name: Build
        run: dotnet build src/GithubWatcher.Desktop/GithubWatcher.Desktop.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/GithubWatcher.Desktop/GithubWatcher.Desktop.csproj --configuration Release --no-build --output artifacts/GithubWatcher.Desktop

      - name: Create release zip
        id: create_release_zip
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $zipName = "GithubWatcher.Desktop-v$version.zip"
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path "artifacts/$zipName") {
            Remove-Item "artifacts/$zipName" -Force
          }
          Compress-Archive -Path artifacts/GithubWatcher.Desktop/* -DestinationPath "artifacts/$zipName"

          "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          generate_release_notes: true
          files: artifacts/${{ steps.create_release_zip.outputs.zip_name }}
