name: Build on Push

on:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/GithubWatcher.Desktop/GithubWatcher.Desktop.csproj

      - name: Build
        run: dotnet build src/GithubWatcher.Desktop/GithubWatcher.Desktop.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/GithubWatcher.Desktop/GithubWatcher.Desktop.csproj --configuration Release --no-build --output artifacts/GithubWatcher.Desktop

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GithubWatcher.Desktop
          path: artifacts/GithubWatcher.Desktop
          if-no-files-found: error
